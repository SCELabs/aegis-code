name: python-cli
description: Python CLI scaffold
files:
  - path: .aegis/aegis-code.yml
    content: |
      mode: balanced
      budget_per_task: 1.0
      models:
        cheap: openai:gpt-4.1-nano
        mid: openai:gpt-4.1-mini
        premium: openai:gpt-4.1
      commands:
        test: "{{test_command}}"
        lint: ""
      aegis:
        base_url: "https://aegis-backend-production-4b47.up.railway.app"
      providers:
        enabled: false
        provider: "openai"
        api_key_env: "OPENAI_API_KEY"
      patches:
        generate_diff: false
        max_context_chars: 12000
        output_file: ".aegis/runs/latest.diff"
  - path: .aegis/project_model.md
    content: |
      # Project Model

      Idea: {{idea}}

      ## Scope
      - Initial scaffold created by aegis-code create.
      - Keep this file updated as architecture evolves.
  - path: src/main.py
    content: |
      def main() -> None:
          print('hello from cli')


      if __name__ == '__main__':
          main()
  - path: tests/test_cli.py
    content: |
      def test_cli_placeholder() -> None:
          assert True
  - path: README.md
    content: |
      # Project

      Generated by aegis-code create.
commands:
  install: null
  test: "{{test_command}}"
  build: null
validation:
  expected_files:
    - .aegis/aegis-code.yml
    - .aegis/project_model.md
    - src/main.py
    - tests/test_cli.py
  expected_signals:
    - python
